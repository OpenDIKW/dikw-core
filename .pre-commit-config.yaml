# Pre-commit hooks for dikw-core. Install once: `uv run pre-commit install`.
#
# Local hooks shell out to `uv run` so they use the EXACT ruff / mypy pinned in
# pyproject — no version drift between the hook, `tools/check.py`, and CI. The
# cheap deterministic stages (ruff, mypy) run on every commit; the fuller floor
# incl. pytest is `uv run python tools/check.py` (see CLAUDE.md "Dev workflow").
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (strict, src)
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types: [python]
