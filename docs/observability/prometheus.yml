# Prometheus scrape config for the dikw-core validation stack.
# Pulls the metrics the OTel Collector re-exposes on its Prometheus endpoint.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      # The collector's `prometheus` exporter endpoint (otel-collector-config.yaml).
      # Reachable on the compose network; no host port publish needed.
      - targets: ["otel-collector:8889"]
