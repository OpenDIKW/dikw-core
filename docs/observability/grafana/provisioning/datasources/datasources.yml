# Grafana datasource provisioning for the dikw-core validation stack.
# Both datasources resolve over the compose network by service name.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
