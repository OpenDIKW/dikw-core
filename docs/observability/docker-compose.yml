# Standalone OpenTelemetry validation stack for dikw-core.
#
#   OTel Collector (:4318 OTLP/HTTP)  →  Jaeger (traces)
#                                     →  Prometheus (metrics)  →  Grafana
#
# This is a LOCAL validation / demo stack — NOT a production deployment.
# For running dikw serve itself in a container see docs/deployment-docker.md.
#
# Quick start:
#   cd docs/observability && docker compose up -d
# Then point dikw at the collector:
#   - server: telemetry: { enabled: true, endpoint: http://localhost:4318 } in dikw.yml
#   - client: export OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
# UIs: Jaeger http://localhost:16686 · Prometheus http://localhost:9090 · Grafana http://localhost:3000
#
# Image tags are pinned for reproducibility; bump them deliberately.
services:
  otel-collector:
    # Keep >= 0.117.0. The 0.116.0 arm64 build is dynamically linked
    # (interpreter /lib/ld-linux-aarch64.so.1) but the image is FROM scratch, so
    # on Apple Silicon the container exits at once with
    # `exec /otelcol-contrib: no such file or directory`; 0.117.0 restored the
    # static arm64 build. amd64 is unaffected.
    image: otel/opentelemetry-collector-contrib:0.117.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"   # OTLP/HTTP — dikw exports traces + metrics here
      - "4317:4317"   # OTLP/gRPC — optional, for non-dikw OTLP clients
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      # Accept OTLP from the collector on the internal network (4317/4318);
      # only the UI port is published to the host.
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI

  prometheus:
    image: prom/prometheus:v3.0.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"     # Prometheus UI

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      # Anonymous admin so the demo opens straight to dashboards — DO NOT
      # copy this auth posture into anything internet-facing.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"     # Grafana UI (Prometheus + Jaeger datasources pre-provisioned)
    depends_on:
      - prometheus
      - jaeger
