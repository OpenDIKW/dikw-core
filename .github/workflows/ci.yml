name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # The actual job matrix lives in reusable-ci.yml so release.yml can
    # call the exact same gate when a tag is pushed. Check name pattern
    # produced by GitHub: ``ci / <called-job-name>`` — matched by the
    # main-protection ruleset's ``required_status_checks``.
    uses: ./.github/workflows/reusable-ci.yml
