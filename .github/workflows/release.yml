name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publishing

jobs:
  # Run the exact same gate PRs run before doing anything irreversible.
  # Previously this workflow ran a thin ``ruff + mypy + pytest -q``
  # gate, which missed the Postgres contract suite, the slow serve-and-
  # run e2e, and the wheel install smoke test — v0.0.2's first PyPI
  # upload was rejected for duplicate wheel entries even though the
  # release gate had passed.
  pre-release-gate:
    uses: ./.github/workflows/reusable-ci.yml

  build:
    name: Build sdist + wheel
    needs: pre-release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        run: |
          set -e
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version=$(uv run --no-project python -c \
            "import tomllib,sys;print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "tag $GITHUB_REF_NAME does not match pyproject version $pyproject_version" >&2
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dikw-core
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  publish-image:
    name: Build + push container image to GHCR
    # Runs AFTER the PyPI publish because the image installs the published
    # wheel (examples/docker/Dockerfile ``pip install dikw-core==X.Y.Z``).
    # ``needs: publish`` only guarantees the upload returned, not that the
    # PyPI CDN has propagated, so the ``Wait for PyPI`` step polls before
    # building rather than letting ``pip install`` 404 on a cold index.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push the image to ghcr.io/opendikw/*
    # ONE-TIME maintainer action: a package pushed with GITHUB_TOKEN is
    # created PRIVATE by default. After the first successful run, set
    # ``ghcr.io/opendikw/dikw-core`` to Public in the org's package settings
    # (Packages → dikw-core → Package settings → Change visibility) so
    # downstream ``docker compose pull`` needs no login, as the docs promise.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Resolve + validate version (strip leading v)
        id: ver
        # Reads the tag from the $GITHUB_REF_NAME env var (never a ${{ }}
        # interpolation into the shell) and refuses anything that isn't
        # strict X.Y.Z — mirrors the sync-dockerfile guard, and means the
        # ``version`` output is digits-and-dots only, so it's safe to use
        # downstream as a curl URL segment, build-arg, and image tag.
        run: |
          set -euo pipefail
          v="${GITHUB_REF_NAME#v}"
          if ! printf '%s\n' "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag ${GITHUB_REF_NAME} maps to '${v}', not strict X.Y.Z — refusing to build an image for it." >&2
            exit 1
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Wait for the wheel to be installable from PyPI
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          url="https://pypi.org/pypi/dikw-core/${VERSION}/json"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url")
            if [ "$code" = "200" ]; then
              echo "dikw-core ${VERSION} is live on PyPI"
              exit 0
            fi
            echo "attempt ${i}: PyPI returned ${code} for ${VERSION}; waiting 10s"
            sleep 10
          done
          echo "::error::dikw-core ${VERSION} never became installable on PyPI (5 min)" >&2
          exit 1

      - name: Set up QEMU (linux/arm64 emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image (installs the published wheel)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: examples/docker
          file: examples/docker/Dockerfile
          # The same Dockerfile the Trivy PR-scan builds — so the published
          # image IS the scanned one. DIKW_VERSION is passed explicitly here
          # because the Dockerfile's ARG default still points at the PRIOR
          # release until the sync-dockerfile PR lands.
          build-args: |
            DIKW_VERSION=${{ steps.ver.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          # :X.Y.Z only (no :latest) — downstream pins an exact release so
          # its debug environment stays reproducible (dikw-core is alpha).
          tags: ghcr.io/opendikw/dikw-core:${{ steps.ver.outputs.version }}
          provenance: false

  github-release:
    name: Create GitHub Release
    # Cuts the GitHub Release for the tag once the PyPI publish succeeds (a
    # Release that 404s on PyPI would be misleading). This automates what
    # maintainers used to run by hand with ``gh release create`` — and kept
    # forgetting (v0.6.0 and several earlier tags shipped to PyPI with no
    # Release). Body is the matching ``CHANGELOG.md`` section; the built
    # wheel + sdist ride along as downloadable assets. ``needs: publish``
    # (not publish-image) so a GHCR hiccup never blocks the Release.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release + upload assets
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Resolve + validate version (strip leading v)
        id: ver
        # Same strict X.Y.Z guard as publish-image — the resolved value is
        # fed to awk as a regex below, so refusing anything but digits-and-
        # dots keeps the extraction injection-safe.
        run: |
          set -euo pipefail
          v="${GITHUB_REF_NAME#v}"
          if ! printf '%s\n' "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag ${GITHUB_REF_NAME} maps to '${v}', not strict X.Y.Z — refusing to cut a release for it." >&2
            exit 1
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Extract this version's CHANGELOG section
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        # Pull the ``## X.Y.Z`` heading block up to the next ``## `` so the
        # release body is the hand-written changelog, not an auto PR dump.
        # ``!g`` opens the gate at most once, and the version is anchored by
        # trailing whitespace/EOL (headings are always ``## X.Y.Z — title``)
        # so a hypothetical ``## X.Y.Z-rc1`` heading can't bleed into a later
        # ``## X.Y.Z`` capture.
        run: |
          set -euo pipefail
          awk -v ver="$VERSION" '
            !g && $0 ~ "^## " ver "([[:space:]]|$)" {g=1; print; next}
            g && /^## / {exit}
            g {print}
          ' CHANGELOG.md > notes.md
          echo "extracted $(wc -l < notes.md) CHANGELOG lines for ${VERSION}"

      - name: Create the GitHub Release (CHANGELOG notes + dist assets)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Fall back to GitHub's auto-generated notes (and warn) when the
        # CHANGELOG has no section for this tag, so a forgotten changelog
        # entry degrades the body rather than failing the release. Assets
        # are globbed by extension (not ``dist/*``) to skip the ``.gitignore``
        # ``uv build`` drops in dist/.
        run: |
          set -euo pipefail
          if [ -s notes.md ]; then
            gh release create "$GITHUB_REF_NAME" dist/*.whl dist/*.tar.gz --verify-tag \
              --title "dikw-core $GITHUB_REF_NAME" --notes-file notes.md
          else
            echo "::warning::No CHANGELOG section for $GITHUB_REF_NAME; using auto-generated notes"
            gh release create "$GITHUB_REF_NAME" dist/*.whl dist/*.tar.gz --verify-tag \
              --title "dikw-core $GITHUB_REF_NAME" --generate-notes
          fi

  sync-dockerfile:
    name: Open PR to sync Dockerfile DIKW_VERSION
    # Closes the drift window between ``pyproject.toml`` bumping the
    # version and PyPI actually hosting the wheel. The Dockerfile's
    # ``ARG DIKW_VERSION`` must point at a published version (the Trivy
    # PR scan ``pip install``s it from PyPI), so we only bump it AFTER
    # ``publish`` succeeds. Historically humans missed this step for
    # 0.2.5 / 0.2.6 / 0.2.7 in a row — automating it removes the
    # discipline tax entirely. PR (not direct push) so branch-protection
    # rules still apply and the chore lands through review.
    #
    # Concurrency note: if two tags (vN, vN+1) are pushed close together,
    # both sync-dockerfile jobs may run in parallel and both checkout
    # main at pre-merge state, opening two PRs that don't see each
    # other's edit. We intentionally don't add a ``concurrency:`` block
    # because queuing the second job would still re-checkout pre-merge
    # main (the queued job runs after publish, not after the prior PR
    # merges) — moving the race from "two open PRs" to "second PR
    # silently has stale base" is strictly worse. Real fix: merge the
    # first sync PR before tagging vN+1; or land vN+1's bump by hand.
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: main

      - name: Bump DIKW_VERSION in Dockerfile
        # Refuse to silently edit if either side of the contract drifted:
        #   (a) the existing Dockerfile line is no longer ``ARG DIKW_VERSION=X.Y.Z``
        #       (someone renamed the arg, split the assignment, etc.), or
        #   (b) the tag we're about to write is not strict ``X.Y.Z`` (e.g.
        #       a PEP 440 pre-release like ``v0.2.7rc1`` or ``v0.2.7.dev1``).
        # The Dockerfile guard in reusable-ci.yml only accepts the strict
        # X.Y.Z shape; writing a pre-release into the Dockerfile here
        # would jam the very next PR on the guard step. Fail loudly in
        # the release workflow instead, where the maintainer who pushed
        # the tag is paying attention.
        run: |
          set -euo pipefail
          v="${GITHUB_REF_NAME#v}"
          if ! printf '%s\n' "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag ${GITHUB_REF_NAME} maps to version '${v}', which is not strict X.Y.Z; Dockerfile guard would reject it. If you intend to support PEP 440 pre-releases (rc/dev/post/local), relax the guard regex in reusable-ci.yml first." >&2
            exit 1
          fi
          if ! grep -qE '^ARG DIKW_VERSION=[0-9]+\.[0-9]+\.[0-9]+$' examples/docker/Dockerfile; then
            echo "::error file=examples/docker/Dockerfile::ARG DIKW_VERSION line missing or shape changed" >&2
            exit 1
          fi
          sed -i -E "s/^ARG DIKW_VERSION=.*/ARG DIKW_VERSION=${v}/" examples/docker/Dockerfile
          git --no-pager diff examples/docker/Dockerfile

      - name: Warn if RELEASE_PR_PAT is unset
        # The token fallback below is intentionally silent (the PR still opens
        # on GITHUB_TOKEN), so emit a release-time ::warning:: — far more visible
        # than the PR-body note — telling the maintainer the PR will be born
        # BLOCKED. Secret is mapped to an env var (never referenced in ``if:``,
        # never echoed) and only its emptiness is tested.
        env:
          RELEASE_PR_PAT: ${{ secrets.RELEASE_PR_PAT }}
        run: |
          if [ -z "${RELEASE_PR_PAT}" ]; then
            echo "::warning::RELEASE_PR_PAT secret is unset — the Dockerfile-bump PR is opened with GITHUB_TOKEN, so its CI cannot auto-run and it is born BLOCKED. Push an empty commit to the PR branch to run the gate, then merge."
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          # A PR opened with the default GITHUB_TOKEN cannot trigger other
          # workflows (GitHub's recursion guard), so ci.yml/Trivy land on the
          # PR head as non-runnable ``action_required`` runs and the required
          # ``ci /`` checks never report — the PR is born BLOCKED and the only
          # un-stick was a manual empty commit / close-reopen. Open it with a
          # PAT instead so ``pull_request`` fires normally and the gate runs.
          # Falls back to GITHUB_TOKEN when the secret is unset: the PR still
          # opens, just gated as before (strictly no worse than the old path),
          # and auto-upgrades the moment the secret lands. Set repo secret
          # RELEASE_PR_PAT to a fine-grained PAT on THIS repo with
          # Contents: read/write + Pull requests: read/write (no Workflows
          # scope — this PR only edits the Dockerfile). See README "Releasing".
          token: ${{ secrets.RELEASE_PR_PAT || github.token }}
          commit-message: |
            chore(docker): bump DIKW_VERSION to ${{ github.ref_name }}
          branch: chore/docker-version-${{ github.ref_name }}
          delete-branch: true
          title: "chore(docker): bump DIKW_VERSION to ${{ github.ref_name }}"
          body: |
            Auto-generated by `release.yml` after publishing `${{ github.ref_name }}` to PyPI.

            The Dockerfile's `DIKW_VERSION` must match a version already on PyPI
            because the Trivy PR-scan job builds the image and `pip install`s
            from PyPI. This PR closes the drift window that opens between the
            `pyproject.toml` version bump and the wheel landing on PyPI.

            **CI note:** when the `RELEASE_PR_PAT` secret is configured this PR
            is opened with it, so `ci.yml`/Trivy run automatically. If the secret
            is unset the PR falls back to the default `GITHUB_TOKEN`, whose PRs
            cannot trigger other workflows — then push an empty commit (or
            close/re-open) to run the gate, or (with admin) merge directly
            (single-line change; the post-publish guard in `reusable-ci.yml`
            re-validates on the next PR).
          labels: |
            chore
            automated
            no-baseline-needed
