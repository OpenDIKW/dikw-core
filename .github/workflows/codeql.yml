name: CodeQL

# Defense-in-depth SAST. Findings appear in the repo's Security tab,
# not on the PR conversation, so this workflow is informational, not
# a merge blocker. Public repo → free Actions minutes for CodeQL.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan to pick up new query packs without waiting for
    # the next PR. Mondays 04:23 UTC — quiet slot.
    - cron: '23 4 * * 1'

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360  # v3
        with:
          languages: python
          # ``security-extended`` widens query coverage to catch deeper
          # patterns (deserialization, injection, hardcoded secrets) at
          # the cost of a few extra minutes per run. Acceptable.
          queries: security-extended
          # Scope analysis to shipped code; exclude repo-root dev/benchmark
          # scripts (tools/, evals/) that aren't in the wheel — see the config
          # file for the rationale (false positives, no product-security value).
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v3
        with:
          category: "/language:python"
