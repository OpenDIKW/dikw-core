name: Eval gate

# Codifies CLAUDE.md's "Things not to do" final bullet:
#   "Don't ship K-layer / Retrieval changes without an entry in
#    evals/BASELINES.md showing real-data outcome."
#
# Until this gate landed, that discipline was pure human review. PRs
# that quietly touched K-layer / Retrieval / storage code with no
# baseline entry slipped through whenever the reviewer (typically the
# author themselves) didn't catch it.
#
# This is a *content* check, not a presence check: it parses the added
# BASELINES.md lines and asserts they form a substantive, change-type-
# appropriate entry (a new, not-reused dated/versioned header; for K-layer/synth
# diffs, signal — synth metrics or lint-outcome counts — OR a non-destructiveness
# claim, plus the elon-musk corpus; retrieval metrics for info diffs). A
# blank-line edit no longer passes. Actually re-running the eval to verify the
# numbers is a separate, heavier gate (roadmap Phase 2).
#
# Override: label the PR ``no-baseline-needed`` for rename-only or
# comment-only refactors that genuinely don't shift behavior.

on:
  pull_request:
    paths:
      - 'src/dikw_core/domains/knowledge/**'
      - 'src/dikw_core/domains/info/**'
      - 'src/dikw_core/storage/**'
      # K-layer authoring also lives outside domains/knowledge/: the synth verb
      # body and the three LLM authoring prompts (synth + the two lint-fix
      # grounded-page generators). A synth-quality PR commonly touches only
      # these (e.g. #172), so without them the gate never fires on the dominant
      # synth-PR shape. Keep this list in sync with _KNOWLEDGE_FILES in
      # tools/check_baselines.py. RetrievalConfig lives in the broad config.py
      # and is left out deliberately (watching it wholesale would gate every
      # config edit).
      - 'src/dikw_core/api_synth.py'
      - 'src/dikw_core/prompts/synthesize.md'
      - 'src/dikw_core/prompts/lint_fix_orphan_merge.md'
      - 'src/dikw_core/prompts/lint_fix_broken_wikilink_grounded.md'

jobs:
  baseline-must-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      # Override via a native expression (no shell): a label containing a quote
      # can't break label detection the way an inline ``${{ toJson(...) }}`` grep can.
      - name: Skip note (no-baseline-needed)
        if: ${{ contains(github.event.pull_request.labels.*.name, 'no-baseline-needed') }}
        run: |
          echo "::notice::PR labeled 'no-baseline-needed' — skipping baseline content check."
          echo "Reviewer is expected to confirm the change is genuinely non-functional."

      # Content check (not just "was the file diffed?"): parse the *added*
      # BASELINES.md lines and assert they form a substantive, change-type-
      # appropriate entry — a new (not reused) dated/versioned header, plus, for
      # K-layer/synth diffs, signal (synth metrics or lint counts) OR a
      # non-destructiveness claim + the elon-musk corpus; retrieval metrics for
      # info diffs. stdlib-only, so no uv/setup-python needed. See
      # tools/check_baselines.py and tests/test_check_baselines.py.
      - name: Content-check evals/BASELINES.md
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-baseline-needed') }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 tools/check_baselines.py --base-sha "$BASE_SHA" --head-sha "$HEAD_SHA"
