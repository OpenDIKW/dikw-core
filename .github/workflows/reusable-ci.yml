name: Reusable CI

# Reusable workflow holding the actual test/build matrix. Both
# ``ci.yml`` (push to main / PR) and ``release.yml`` (tag push) call
# this so the release gate is byte-for-byte identical to the PR gate —
# the v0.0.2 ``twine upload`` rejection happened because the release
# path ran a thinner ``pytest -q`` than CI's ``-v -m "not slow and not
# perf"`` + Postgres service + e2e + wheel smoke. One source of truth
# kills that asymmetry.

on:
  workflow_call:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write   # Codecov OIDC tokenless upload
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest (fast, excludes slow + perf)
        run: uv run pytest -v -m "not slow and not perf" --cov=src/dikw_core --cov-report=xml

      - name: Upload coverage to Codecov
        # Avoid duplicate upload; 3.13 coverage is identical.
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          flags: unit
          use_oidc: true

  server-e2e:
    name: Server e2e (serve-and-run)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Slow tests (subprocess + bind real port)
        # Covers ``client/serve_and_run.py`` end-to-end: spawns the real
        # ``dikw serve`` process, polls /v1/healthz, runs the inner
        # client command, and asserts a clean shutdown. Splitting this
        # out from the matrix job keeps the failure mode visible (a
        # broken subprocess lifecycle dominates the CI report instead
        # of being one row in a pytest summary).
        run: uv run pytest -v -m "slow"

  postgres-contract:
    name: Postgres contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write   # Codecov OIDC tokenless upload (Postgres-only coverage)
    services:
      postgres:
        # Matches examples/docker/docker-compose.yml byte-for-byte.
        image: pgvector/pgvector:0.8.2-pg18
        env:
          POSTGRES_USER: dikw
          POSTGRES_PASSWORD: dikw
          POSTGRES_DB: dikw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dikw -d dikw"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DIKW_TEST_POSTGRES_DSN: postgresql://dikw:dikw@localhost:5432/dikw
      # Task store PG contract has its own env var so the wiki-DB DSN
      # and the tasks-DB DSN can diverge in production (per Phase-0
      # decision in store_postgres.py). For CI we point both at the
      # same instance — different schemas, no cross-talk.
      DIKW_TEST_POSTGRES_TASKS_DSN: postgresql://dikw:dikw@localhost:5432/dikw
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (with postgres extra)
        run: uv sync --all-extras

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U dikw; then
              echo "postgres is ready"; exit 0
            fi
            sleep 1
          done
          echo "postgres failed to become ready" >&2
          exit 1

      - name: Run storage + task-store contract tests against Postgres
        # Measure coverage here too: the Postgres adapters
        # (storage/postgres.py, tasks/store_postgres.py) are exercised
        # ONLY by this job — the matrix ``unit`` job runs without a DSN so
        # their tests skip there. Without this upload, any change to a
        # Postgres-only code path shows as 0 % patch coverage on Codecov
        # even though it is fully tested. Codecov merges sessions by flag,
        # so these hits union with the ``unit`` report (never subtract).
        run: |
          uv run pytest -v \
            --cov=src/dikw_core --cov-report=xml \
            tests/test_storage_contract.py \
            tests/server/test_task_store_contract.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          flags: postgres
          use_oidc: true

  dockerfile-version-guard:
    name: Dockerfile DIKW_VERSION guard
    # Belt-and-suspenders guard for the version drift between
    # ``pyproject.toml`` and ``examples/docker/Dockerfile``. The
    # ``sync-dockerfile`` job in ``release.yml`` is supposed to auto-bump
    # the Dockerfile after every PyPI publish, but if it ever fails (PAT
    # expired, branch protection mismatch, hand-edit going around the
    # automation) this guard catches the drift on the very next PR.
    #
    # Invariant: ARG DIKW_VERSION in the Dockerfile must equal
    # pyproject.toml's version OR be a version already published on PyPI
    # (the publish-window transitional state where ``pyproject.toml``
    # has been bumped to N but only N-1 is on PyPI yet, so the Dockerfile
    # legitimately points at N-1 until ``sync-dockerfile`` runs).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        # Pin Python explicitly so ``import tomllib`` (Python 3.11+ stdlib)
        # doesn't depend on whatever default ``python3`` ubuntu-latest
        # currently ships. Other jobs in this workflow rely on uv to do
        # this; this job intentionally stays minimal (no uv install) so
        # we use setup-python directly.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Compare Dockerfile DIKW_VERSION against pyproject + PyPI
        run: |
          set -euo pipefail
          # Anchor the full line shape (^…$) before extracting — without the
          # trailing $, ``ARG DIKW_VERSION=0.2.7-bad`` or
          # ``ARG DIKW_VERSION=0.2.7 # note`` would pass the parse step and
          # extract just ``0.2.7``, then PyPI would (correctly) say 0.2.7
          # exists, and the guard would let the malformed default ship to
          # the Trivy image build (where ``pip install ...==0.2.7-bad``
          # then fails). Mirrors the sync-dockerfile shape check.
          if ! grep -qE '^ARG DIKW_VERSION=[0-9]+\.[0-9]+\.[0-9]+$' examples/docker/Dockerfile; then
            echo "::error file=examples/docker/Dockerfile::ARG DIKW_VERSION line missing or shape changed (must be 'ARG DIKW_VERSION=X.Y.Z', no suffix, no inline comment)"
            exit 1
          fi
          dv=$(grep -oE '^ARG DIKW_VERSION=[0-9]+\.[0-9]+\.[0-9]+$' examples/docker/Dockerfile | cut -d= -f2)
          pv=$(python3 -c "import tomllib;print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          echo "Dockerfile DIKW_VERSION=$dv  pyproject=$pv"
          if [ "$dv" = "$pv" ]; then
            echo "OK: Dockerfile matches pyproject (post-sync steady state)"
            exit 0
          fi
          echo "Versions differ; verifying $dv is published on PyPI (publish-window state)"
          # ``curl --fail`` returns non-zero on 4xx/5xx so the test below
          # distinguishes "version not on PyPI" from network blips.
          if curl -fsS --max-time 10 "https://pypi.org/pypi/dikw-core/${dv}/json" >/dev/null; then
            echo "OK: $dv is published on PyPI; sync PR is pending or in flight"
            exit 0
          fi
          cat >&2 <<EOF
          ::error file=examples/docker/Dockerfile::DIKW_VERSION drift: $dv is neither pyproject ($pv) nor published on PyPI

          Fix one of:
            (a) bump Dockerfile to match pyproject ($pv), if $pv is already on PyPI
            (b) wait for release.yml's sync-dockerfile job to open the chore PR
            (c) check network — pypi.org may be unreachable from this runner
          EOF
          exit 1

  wheel-smoke:
    name: Wheel install smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build wheel + sdist
        run: uv build

      - name: Install wheel in a fresh venv
        # Mirrors what ``pip install dikw-core`` does for an end user. The
        # uv-managed dev venv has the source tree bind-mounted, so anything
        # missing from the wheel (force-include misconfig, datasets not
        # packaged, schema.sql excluded, etc.) is invisible there.
        run: |
          python -m venv /tmp/dikw-test
          /tmp/dikw-test/bin/pip install --upgrade pip
          /tmp/dikw-test/bin/pip install dist/*.whl

      - name: Smoke test installed CLI
        run: |
          /tmp/dikw-test/bin/dikw --help
          /tmp/dikw-test/bin/dikw version
