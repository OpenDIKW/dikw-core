name: Feature request
description: Suggest an idea or improvement for dikw-core
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! dikw-core is in alpha, so the design is still
        moving — for larger changes, please open this issue to discuss before
        sending a big PR.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point, not just the solution.
      placeholder: "When I retrieve across a large base, I can't…"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen. CLI/API shape, config, behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why they fall short.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art (e.g. Karpathy's LLM-Wiki, Open Knowledge Format), screenshots.
    validations:
      required: false
